<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulo 4 - WireGuard e VPN Moderne</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e17; color: #f1f5f9; min-height: 100vh; overflow-x: hidden; }
        @media (max-width: 1024px) { html { font-size: 15px; } }
        @media (max-width: 768px) { html { font-size: 14px; } .slide-grid { grid-template-columns: 1fr !important; } svg { max-width: 100% !important; } pre { white-space: pre-wrap !important; word-break: break-all !important; } }
        @media (max-width: 480px) { html { font-size: 13px; } button { width: 100% !important; } }
        @media (min-width: 1600px) { html { font-size: 18px; } }
        @media (min-width: 2000px) { html { font-size: 20px; } }
        @media (min-width: 2400px) { html { font-size: 22px; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const colors = {
            bg: '#0a0e17', bgCard: '#111827', bgLight: '#1e293b',
            accent: '#a78bfa', accentAlt: '#0ea5e9',
            text: '#f1f5f9', textDim: '#94a3b8', textMuted: '#64748b',
            border: '#334155',
            success: '#22c55e', danger: '#ef4444', warn: '#f59e0b',
            info: '#0ea5e9', purple: '#a78bfa', cyan: '#22d3ee'
        };

        const MODULE_NUM = 4;
        const MODULE_TITLE = 'WireGuard e VPN Moderne';
        const MODULE_COLOR = '#a78bfa';
        const PREV_MODULE = { title: 'VPN SSL/TLS e OpenVPN', file: 'modulo3-openvpn.html' };
        const NEXT_MODULE = { title: 'Scenari Pratici e Lab', file: 'modulo5-scenari-pratici.html' };

        const Code = ({ children, title }) => (
            <pre style={{ background: '#0d1117', border: `1px solid ${colors.border}`, borderRadius: '12px', padding: 'clamp(14px, 1.5vw, 20px)', fontSize: 'clamp(12px, 1.1vw, 15px)', fontFamily: "'JetBrains Mono', monospace", overflowX: 'auto', lineHeight: 1.7 }}>
                {title && <div style={{ color: MODULE_COLOR, paddingBottom: '10px', fontWeight: 600 }}>{'// '}{title}</div>}
                <code>{children}</code>
            </pre>
        );

        const Box = ({ type, title, children }) => {
            const colorMap = { info: colors.info, warn: colors.warn, danger: colors.danger, success: colors.success, tip: MODULE_COLOR };
            const iconMap = { info: 'ℹ️', warn: '⚠️', danger: '❌', success: '✅', tip: '💡' };
            return (
                <div style={{ borderLeft: `4px solid ${colorMap[type] || colors.info}`, padding: 'clamp(14px, 1.5vw, 20px)', margin: '16px 0', borderRadius: '0 12px 12px 0', background: colors.bgCard }}>
                    {title && <div style={{ color: colorMap[type], fontWeight: 700, marginBottom: '8px', fontSize: 'clamp(14px, 1.3vw, 18px)' }}>{iconMap[type]} {title}</div>}
                    <div style={{ color: colors.textDim, lineHeight: 1.7, fontSize: 'clamp(13px, 1.2vw, 17px)' }}>{children}</div>
                </div>
            );
        };

        const Table = ({ headers, rows }) => (
            <div style={{ overflowX: 'auto', margin: '16px 0' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 'clamp(12px, 1.1vw, 16px)' }}>
                    <thead><tr>{headers.map((h, i) => <th key={i} style={{ padding: 'clamp(8px, 1vw, 14px)', background: colors.bgLight, color: MODULE_COLOR, fontWeight: 700, textAlign: 'left', borderBottom: `2px solid ${MODULE_COLOR}40` }}>{h}</th>)}</tr></thead>
                    <tbody>{rows.map((row, i) => <tr key={i}>{row.map((cell, j) => <td key={j} style={{ padding: 'clamp(8px, 1vw, 14px)', borderBottom: `1px solid ${colors.border}`, color: colors.textDim, background: i % 2 === 0 ? 'transparent' : `${colors.bgLight}40` }}>{cell}</td>)}</tr>)}</tbody>
                </table>
            </div>
        );

        const Glow = ({ children, color }) => (
            <div style={{ border: `2px solid ${color || MODULE_COLOR}`, borderRadius: '16px', padding: 'clamp(16px, 2vw, 24px)', boxShadow: `0 0 25px ${(color || MODULE_COLOR)}30`, background: colors.bgCard }}>{children}</div>
        );

        // ─── SLIDE ───
        const SlideTitolo = () => (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '70vh', textAlign: 'center', gap: '20px' }}>
                <div style={{ fontSize: '72px' }}>⚡</div>
                <div style={{ fontSize: 'clamp(12px, 1.1vw, 15px)', color: MODULE_COLOR, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '2px' }}>Modulo {MODULE_NUM}</div>
                <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(36px, 4vw, 68px)', fontWeight: 700, background: `linear-gradient(135deg, ${MODULE_COLOR}, ${colors.cyan})`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                    {MODULE_TITLE}
                </h1>
                <p style={{ fontSize: 'clamp(16px, 1.5vw, 22px)', color: colors.textDim, maxWidth: '600px' }}>
                    Il protocollo VPN del futuro: semplice, veloce e sicuro per design
                </p>
            </div>
        );

        const SlidePerche = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Perché <span style={{ color: MODULE_COLOR }}>WireGuard</span> è rivoluzionario
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '16px', marginBottom: '20px' }} className="slide-grid">
                    {[
                        { icon: '📏', title: '~4.000 righe di codice', desc: 'vs ~100.000 di OpenVPN e ~400.000 di IPsec. Meno codice = meno bug, più facile da verificare.', color: MODULE_COLOR },
                        { icon: '⚡', title: 'Performance superiori', desc: 'Opera nel kernel Linux. Throughput fino a 3-4x rispetto a OpenVPN. Latenza minima.', color: colors.success },
                        { icon: '🔐', title: 'Crittografia moderna', desc: 'ChaCha20, Poly1305, Curve25519, BLAKE2s, HKDF. Nessuna negoziazione cipher: uno stack fisso e sicuro.', color: colors.warn },
                        { icon: '📱', title: 'Roaming trasparente', desc: 'Cambia rete (Wi-Fi ↔ 4G) senza disconnettersi. Basato su UDP, stateless per design.', color: colors.info },
                        { icon: '🔧', title: 'Configurazione minimale', desc: 'Solo chiave pubblica/privata + IP + endpoint. Niente CA, certificati, SA complesse.', color: colors.cyan },
                        { icon: '🐧', title: 'Nel kernel Linux', desc: 'Incluso nel kernel Linux dal 5.6 (2020). Supporto nativo anche su Windows, macOS, Android, iOS.', color: colors.danger }
                    ].map((item, i) => (
                        <div key={i} style={{ background: colors.bgCard, border: `1px solid ${item.color}30`, borderRadius: '12px', padding: 'clamp(14px, 1.5vw, 20px)' }}>
                            <div style={{ fontSize: '28px', marginBottom: '8px' }}>{item.icon}</div>
                            <h4 style={{ color: item.color, fontSize: 'clamp(13px, 1.2vw, 17px)', fontWeight: 700, marginBottom: '6px' }}>{item.title}</h4>
                            <p style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)', lineHeight: 1.6 }}>{item.desc}</p>
                        </div>
                    ))}
                </div>
                <Box type="info" title="Filosofia di design">
                    WireGuard segue il principio <strong>"Noise Protocol Framework"</strong>: nessuna negoziazione di parametri crittografici.
                    Se un algoritmo viene rotto, si aggiorna la versione del protocollo. Questo elimina attacchi come <em>downgrade attacks</em>.
                </Box>
            </div>
        );

        const SlideConfronto = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Confronto <span style={{ color: MODULE_COLOR }}>WireGuard</span> vs <span style={{ color: colors.info }}>IPsec</span> vs <span style={{ color: colors.warn }}>OpenVPN</span>
                </h2>
                <Table
                    headers={['', 'WireGuard', 'IPsec/IKEv2', 'OpenVPN']}
                    rows={[
                        [<strong style={{ color: colors.text }}>Righe di codice</strong>, <strong style={{ color: MODULE_COLOR }}>~4.000</strong>, '~400.000', '~100.000'],
                        ['Crittografia', 'ChaCha20-Poly1305', 'AES-256 (negoziabile)', 'AES-256 (negoziabile)'],
                        ['Livello OSI', 'L3 (kernel)', 'L3 (kernel)', 'L4 (user-space)'],
                        ['Throughput', <span style={{ color: colors.success }}>⭐⭐⭐⭐⭐ (~1 Gbps)</span>, <span style={{ color: colors.success }}>⭐⭐⭐⭐ (~800 Mbps)</span>, '⭐⭐⭐ (~400 Mbps)'],
                        ['Latenza', <span style={{ color: colors.success }}>Minima (1-RTT)</span>, 'Media (IKE 4-6 msg)', 'Media (TLS handshake)'],
                        ['Configurazione', <span style={{ color: colors.success }}>Semplicissima</span>, <span style={{ color: colors.danger }}>Complessa</span>, 'Media'],
                        ['Negoziazione cipher', <span style={{ color: MODULE_COLOR }}>NO (fisso)</span>, 'Sì (IKE)', 'Sì (TLS)'],
                        ['NAT traversal', <span style={{ color: colors.success }}>Nativo (UDP)</span>, 'NAT-T (UDP 4500)', <span style={{ color: colors.success }}>Nativo</span>],
                        ['Roaming', <span style={{ color: colors.success }}>Trasparente</span>, <span style={{ color: colors.warn }}>Con MOBIKE</span>, <span style={{ color: colors.danger }}>Riconnessione</span>],
                        ['Mobile', <span style={{ color: colors.success }}>Eccellente (batteria)</span>, 'Buono (IKEv2)', 'Discreto'],
                        ['Maturità', '2020+ (giovane)', 'Decenni (enterprise)', '20+ anni (maturo)']
                    ]}
                />
            </div>
        );

        const SlideConfig = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Configurazione <span style={{ color: MODULE_COLOR }}>WireGuard</span>
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '20px' }} className="slide-grid">
                    <div>
                        <Code title="1. Generazione chiavi">
{`# Server
wg genkey | tee server_private.key | \\
  wg pubkey > server_public.key

# Client
wg genkey | tee client_private.key | \\
  wg pubkey > client_public.key`}</Code>
                        <Code title="2. Server config (/etc/wireguard/wg0.conf)">
{`[Interface]
Address = 10.0.0.1/24
ListenPort = 51820
PrivateKey = <server_private_key>

# Firewall (opzionale)
PostUp   = iptables -A FORWARD -i wg0 \\
           -j ACCEPT; iptables -t nat \\
           -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 \\
           -j ACCEPT; iptables -t nat \\
           -D POSTROUTING -o eth0 -j MASQUERADE

[Peer]
# Client 1
PublicKey = <client_public_key>
AllowedIPs = 10.0.0.2/32`}</Code>
                    </div>
                    <div>
                        <Code title="3. Client config">
{`[Interface]
Address = 10.0.0.2/24
PrivateKey = <client_private_key>
DNS = 1.1.1.1

[Peer]
PublicKey = <server_public_key>
Endpoint = vpn.azienda.it:51820
AllowedIPs = 0.0.0.0/0
  # ↑ tutto il traffico nel tunnel
  # oppure 10.0.0.0/24, 192.168.1.0/24
  # per split tunneling
PersistentKeepalive = 25`}</Code>
                        <Code title="4. Attivazione">
{`# Server: avvia interfaccia
wg-quick up wg0

# Abilita all'avvio
systemctl enable wg-quick@wg0

# Stato connessione
wg show`}</Code>
                        <Box type="tip" title="Semplicità">
                            Nessuna CA, nessun certificato, nessun DH. Solo coppie di chiavi Curve25519 e IP.
                            Un peer è identificato dalla sua chiave pubblica.
                        </Box>
                    </div>
                </div>
            </div>
        );

        const SlideCrypto = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Stack <span style={{ color: MODULE_COLOR }}>crittografico</span> WireGuard
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '24px' }} className="slide-grid">
                    <div>
                        {[
                            { name: 'Curve25519', role: 'Key Exchange (ECDH)', desc: 'Scambio chiavi ellittico, 128 bit di sicurezza effettiva. Veloce e resistente a timing attacks.', color: MODULE_COLOR },
                            { name: 'ChaCha20', role: 'Cifratura simmetrica', desc: 'Stream cipher di Daniel Bernstein. Più veloce di AES su dispositivi senza AES-NI (mobile/ARM).', color: colors.info },
                            { name: 'Poly1305', role: 'Autenticazione (MAC)', desc: 'Message authentication code. Combinato con ChaCha20 forma AEAD (Authenticated Encryption with Associated Data).', color: colors.warn },
                            { name: 'BLAKE2s', role: 'Hashing', desc: 'Hash function più veloce di SHA-256 mantenendo la stessa sicurezza. Usato per derivazione chiavi.', color: colors.success },
                            { name: 'HKDF', role: 'Key Derivation', desc: 'Deriva chiavi di sessione dal shared secret Curve25519. Ogni sessione ha chiavi uniche.', color: colors.cyan }
                        ].map((item, i) => (
                            <div key={i} style={{ display: 'flex', gap: '14px', marginBottom: '16px', padding: '14px', borderRadius: '12px', background: colors.bgCard, border: `1px solid ${item.color}25` }}>
                                <div style={{ width: '4px', borderRadius: '2px', background: item.color, flexShrink: 0 }} />
                                <div>
                                    <div style={{ display: 'flex', gap: '10px', alignItems: 'baseline', marginBottom: '4px' }}>
                                        <strong style={{ color: item.color, fontSize: 'clamp(14px, 1.3vw, 18px)' }}>{item.name}</strong>
                                        <span style={{ color: colors.textMuted, fontSize: 'clamp(11px, 1vw, 13px)' }}>{item.role}</span>
                                    </div>
                                    <p style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)', lineHeight: 1.5 }}>{item.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div>
                        <svg viewBox="0 0 400 320" style={{ width: '100%', maxWidth: '400px' }}>
                            <text x="200" y="25" textAnchor="middle" fill={colors.text} fontSize="14" fontWeight="700" fontFamily="Space Grotesk">Noise Protocol (1-RTT Handshake)</text>

                            {/* Initiator */}
                            <rect x="20" y="45" width="120" height="40" rx="8" fill={colors.bgCard} stroke={colors.info} strokeWidth="2" />
                            <text x="80" y="70" textAnchor="middle" fill={colors.info} fontSize="12" fontWeight="600" fontFamily="Inter">Initiator</text>

                            {/* Responder */}
                            <rect x="260" y="45" width="120" height="40" rx="8" fill={colors.bgCard} stroke={MODULE_COLOR} strokeWidth="2" />
                            <text x="320" y="70" textAnchor="middle" fill={MODULE_COLOR} fontSize="12" fontWeight="600" fontFamily="Inter">Responder</text>

                            {/* Message 1 */}
                            <line x1="140" y1="105" x2="260" y2="105" stroke={colors.info} strokeWidth="2" markerEnd="url(#a1)" />
                            <text x="200" y="98" textAnchor="middle" fill={colors.info} fontSize="10" fontFamily="Inter" fontWeight="600">Msg 1: ephemeral + static</text>
                            <text x="200" y="120" textAnchor="middle" fill={colors.textMuted} fontSize="9" fontFamily="Inter">DH(Ei, Sr) + DH(Si, Sr)</text>

                            {/* Message 2 */}
                            <line x1="260" y1="150" x2="140" y2="150" stroke={MODULE_COLOR} strokeWidth="2" markerEnd="url(#a2)" />
                            <text x="200" y="143" textAnchor="middle" fill={MODULE_COLOR} fontSize="10" fontFamily="Inter" fontWeight="600">Msg 2: ephemeral + empty</text>
                            <text x="200" y="165" textAnchor="middle" fill={colors.textMuted} fontSize="9" fontFamily="Inter">DH(Er, Si) + DH(Er, Ei)</text>

                            {/* Data */}
                            <rect x="100" y="190" width="200" height="35" rx="17" fill={`${colors.success}10`} stroke={colors.success} strokeWidth="2" />
                            <text x="200" y="212" textAnchor="middle" fill={colors.success} fontSize="11" fontWeight="700" fontFamily="Inter">🔒 Dati (ChaCha20-Poly1305)</text>

                            <text x="200" y="250" textAnchor="middle" fill={colors.text} fontSize="11" fontWeight="600" fontFamily="Inter">Solo 1 round-trip!</text>
                            <text x="200" y="270" textAnchor="middle" fill={colors.textMuted} fontSize="10" fontFamily="Inter">vs IKE: 4-9 messaggi</text>
                            <text x="200" y="288" textAnchor="middle" fill={colors.textMuted} fontSize="10" fontFamily="Inter">vs TLS: 2-4 round-trips</text>

                            <defs>
                                <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill={colors.info} /></marker>
                                <marker id="a2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill={MODULE_COLOR} /></marker>
                            </defs>
                        </svg>
                    </div>
                </div>
            </div>
        );

        const SlideCommerciali = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    VPN <span style={{ color: colors.danger }}>Commerciali</span> vs <span style={{ color: colors.success }}>Self-hosted</span>
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '24px' }} className="slide-grid">
                    <div style={{ background: colors.bgCard, border: `1px solid ${colors.danger}40`, borderRadius: '16px', padding: 'clamp(18px, 2vw, 28px)' }}>
                        <h3 style={{ color: colors.danger, fontSize: 'clamp(18px, 1.7vw, 26px)', fontWeight: 700, marginBottom: '16px' }}>🏪 VPN Commerciali</h3>
                        <p style={{ color: colors.textDim, fontSize: 'clamp(13px, 1.2vw, 16px)', marginBottom: '16px' }}>
                            NordVPN, ExpressVPN, Surfshark, Mullvad, ProtonVPN...
                        </p>
                        <h4 style={{ color: colors.success, marginBottom: '8px' }}>Pro</h4>
                        {['Facili da usare (app click-and-go)', 'Server in molti paesi', 'Utili per geo-unblocking', 'Supporto tecnico incluso'].map((item, i) => (
                            <div key={i} style={{ display: 'flex', gap: '8px', marginBottom: '6px', color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>
                                <span style={{ color: colors.success }}>✓</span> {item}
                            </div>
                        ))}
                        <h4 style={{ color: colors.danger, marginTop: '12px', marginBottom: '8px' }}>Contro</h4>
                        {['Il provider vede TUTTO il traffico', '"No-log" non sempre verificabile', 'Nessun accesso a rete aziendale', 'Possono vendere dati (VPN gratuite)', 'Performance variabili'].map((item, i) => (
                            <div key={i} style={{ display: 'flex', gap: '8px', marginBottom: '6px', color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>
                                <span style={{ color: colors.danger }}>✗</span> {item}
                            </div>
                        ))}
                    </div>
                    <div style={{ background: colors.bgCard, border: `1px solid ${colors.success}40`, borderRadius: '16px', padding: 'clamp(18px, 2vw, 28px)' }}>
                        <h3 style={{ color: colors.success, fontSize: 'clamp(18px, 1.7vw, 26px)', fontWeight: 700, marginBottom: '16px' }}>🏠 VPN Self-hosted</h3>
                        <p style={{ color: colors.textDim, fontSize: 'clamp(13px, 1.2vw, 16px)', marginBottom: '16px' }}>
                            WireGuard, OpenVPN, IPsec su server proprio (VPS, Raspberry Pi, router...)
                        </p>
                        <h4 style={{ color: colors.success, marginBottom: '8px' }}>Pro</h4>
                        {['Controllo totale sui dati', 'Accesso alla rete locale da remoto', 'Nessun intermediario (zero trust)', 'Costi minimi (VPS ~5€/mese)', 'Personalizzazione completa'].map((item, i) => (
                            <div key={i} style={{ display: 'flex', gap: '8px', marginBottom: '6px', color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>
                                <span style={{ color: colors.success }}>✓</span> {item}
                            </div>
                        ))}
                        <h4 style={{ color: colors.danger, marginTop: '12px', marginBottom: '8px' }}>Contro</h4>
                        {['Richiede competenze tecniche', 'Manutenzione e aggiornamenti', 'Server in un solo luogo (no geo)', 'Responsabilità sicurezza tua'].map((item, i) => (
                            <div key={i} style={{ display: 'flex', gap: '8px', marginBottom: '6px', color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>
                                <span style={{ color: colors.danger }}>✗</span> {item}
                            </div>
                        ))}
                    </div>
                </div>
                <Box type="warn" title="Attenzione alle VPN gratuite">
                    Se il servizio è gratuito, <strong>il prodotto sei tu</strong>. Molte VPN gratuite raccolgono e vendono dati di navigazione,
                    iniettano pubblicità o sono gestite da entità poco trasparenti.
                </Box>
            </div>
        );

        // ─── SIMULATORE CONFRONTO PERFORMANCE ───
        const SlideSimPerformance = () => {
            const [metric, setMetric] = useState('throughput');

            const data = {
                throughput: {
                    label: 'Throughput (Mbps)',
                    icon: '📊',
                    values: [
                        { name: 'WireGuard', value: 1011, max: 1200, color: MODULE_COLOR },
                        { name: 'IPsec/IKEv2', value: 825, max: 1200, color: colors.info },
                        { name: 'OpenVPN (UDP)', value: 412, max: 1200, color: colors.warn },
                        { name: 'OpenVPN (TCP)', value: 305, max: 1200, color: colors.danger }
                    ]
                },
                latency: {
                    label: 'Latenza handshake (ms)',
                    icon: '⏱️',
                    values: [
                        { name: 'WireGuard', value: 1, max: 250, color: MODULE_COLOR, suffix: ' (1-RTT)' },
                        { name: 'IPsec/IKEv2', value: 120, max: 250, color: colors.info, suffix: ' (4-6 msg)' },
                        { name: 'OpenVPN (UDP)', value: 180, max: 250, color: colors.warn, suffix: ' (TLS)' },
                        { name: 'OpenVPN (TCP)', value: 220, max: 250, color: colors.danger, suffix: ' (TLS+TCP)' }
                    ]
                },
                codesize: {
                    label: 'Righe di codice',
                    icon: '📏',
                    values: [
                        { name: 'WireGuard', value: 4000, max: 420000, color: MODULE_COLOR },
                        { name: 'OpenVPN', value: 100000, max: 420000, color: colors.warn },
                        { name: 'StrongSwan (IPsec)', value: 420000, max: 420000, color: colors.info }
                    ]
                },
                config: {
                    label: 'Righe di configurazione',
                    icon: '🔧',
                    values: [
                        { name: 'WireGuard', value: 10, max: 40, color: MODULE_COLOR },
                        { name: 'OpenVPN', value: 25, max: 40, color: colors.warn },
                        { name: 'IPsec (Cisco)', value: 35, max: 40, color: colors.info }
                    ]
                }
            };

            const d = data[metric];
            const isLowerBetter = metric === 'latency' || metric === 'codesize' || metric === 'config';

            return (
                <div>
                    <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '8px' }}>
                        🧪 Confronto <span style={{ color: MODULE_COLOR }}>Performance</span> e Complessità
                    </h2>
                    <p style={{ color: colors.textDim, fontSize: 'clamp(13px, 1.2vw, 17px)', marginBottom: '20px' }}>
                        Confronta i principali protocolli VPN su diverse metriche.
                    </p>

                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginBottom: '24px' }}>
                        {Object.entries(data).map(([key, val]) => (
                            <button key={key} onClick={() => setMetric(key)} style={{
                                padding: '10px 18px', borderRadius: '10px',
                                border: `2px solid ${metric === key ? MODULE_COLOR : colors.border}`,
                                background: metric === key ? `${MODULE_COLOR}20` : colors.bgCard,
                                color: metric === key ? MODULE_COLOR : colors.textDim,
                                cursor: 'pointer', fontSize: 'clamp(13px, 1.2vw, 16px)', fontFamily: 'Inter', fontWeight: 600
                            }}>{val.icon} {val.label}</button>
                        ))}
                    </div>

                    <div style={{ background: colors.bgCard, borderRadius: '16px', border: `1px solid ${MODULE_COLOR}40`, padding: 'clamp(18px, 2vw, 28px)' }}>
                        <h3 style={{ color: MODULE_COLOR, fontSize: 'clamp(16px, 1.5vw, 22px)', marginBottom: '24px' }}>
                            {d.icon} {d.label} {isLowerBetter && <span style={{ color: colors.textMuted, fontSize: 'clamp(11px, 1vw, 14px)' }}>(meno è meglio)</span>}
                        </h3>

                        {d.values.map((item, i) => (
                            <div key={i} style={{ marginBottom: '20px' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
                                    <span style={{ color: item.color, fontWeight: 700, fontSize: 'clamp(13px, 1.2vw, 16px)' }}>{item.name}</span>
                                    <span style={{ color: colors.text, fontWeight: 600, fontSize: 'clamp(13px, 1.2vw, 16px)', fontFamily: "'JetBrains Mono', monospace" }}>
                                        {item.value.toLocaleString()}{item.suffix || ''}
                                    </span>
                                </div>
                                <div style={{ width: '100%', height: '24px', background: colors.bgLight, borderRadius: '12px', overflow: 'hidden' }}>
                                    <div style={{
                                        width: `${Math.max(3, (item.value / d.values[0].max * 100))}%`,
                                        height: '100%',
                                        background: `linear-gradient(90deg, ${item.color}60, ${item.color})`,
                                        borderRadius: '12px',
                                        transition: 'width 0.5s ease'
                                    }} />
                                </div>
                            </div>
                        ))}

                        {metric === 'throughput' && <Box type="tip" title="Note">Test su connessione Gigabit Ethernet, server Linux kernel 5.15, singolo core. WireGuard eccelle grazie all'esecuzione in kernel-space.</Box>}
                        {metric === 'latency' && <Box type="tip" title="Note">WireGuard stabilisce la connessione in 1 solo round-trip (100ms su link tipico). IKE richiede 4-6 messaggi.</Box>}
                    </div>
                </div>
            );
        };

        const SlideMesh = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Topologie <span style={{ color: MODULE_COLOR }}>WireGuard</span> e VPN mesh
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '24px' }} className="slide-grid">
                    <div>
                        <Glow color={colors.info}>
                            <h4 style={{ color: colors.info, fontSize: 'clamp(14px, 1.3vw, 18px)', marginBottom: '10px' }}>⭐ Hub-and-Spoke (classica)</h4>
                            <svg viewBox="0 0 300 180" style={{ width: '100%' }}>
                                <circle cx="150" cy="90" r="30" fill={`${colors.info}20`} stroke={colors.info} strokeWidth="2" />
                                <text x="150" y="95" textAnchor="middle" fill={colors.info} fontSize="10" fontWeight="700" fontFamily="Inter">Server</text>
                                {[[50, 30], [250, 30], [50, 150], [250, 150]].map(([cx, cy], i) => (
                                    <g key={i}>
                                        <circle cx={cx} cy={cy} r="18" fill={colors.bgCard} stroke={colors.textDim} strokeWidth="1.5" />
                                        <text x={cx} y={cy + 4} textAnchor="middle" fill={colors.textDim} fontSize="12">💻</text>
                                        <line x1={cx + (cx < 150 ? 18 : -18)} y1={cy + (cy < 90 ? 10 : -10)} x2={150 + (cx < 150 ? -30 : 30)} y2={90} stroke={colors.info} strokeWidth="1.5" strokeDasharray="4,3" />
                                    </g>
                                ))}
                            </svg>
                            <p style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)', marginTop: '8px' }}>
                                Tutti i client passano dal server centrale. Semplice ma single point of failure.
                            </p>
                        </Glow>
                    </div>
                    <div>
                        <Glow color={MODULE_COLOR}>
                            <h4 style={{ color: MODULE_COLOR, fontSize: 'clamp(14px, 1.3vw, 18px)', marginBottom: '10px' }}>🕸️ Full Mesh (peer-to-peer)</h4>
                            <svg viewBox="0 0 300 180" style={{ width: '100%' }}>
                                {[[80, 30], [220, 30], [50, 130], [150, 160], [250, 130]].map(([cx, cy], i, arr) => (
                                    <g key={i}>
                                        {arr.slice(i + 1).map(([cx2, cy2], j) => (
                                            <line key={j} x1={cx} y1={cy} x2={cx2} y2={cy2} stroke={MODULE_COLOR} strokeWidth="1" strokeDasharray="4,3" opacity="0.5" />
                                        ))}
                                        <circle cx={cx} cy={cy} r="18" fill={`${MODULE_COLOR}20`} stroke={MODULE_COLOR} strokeWidth="2" />
                                        <text x={cx} y={cy + 4} textAnchor="middle" fill={colors.text} fontSize="12">💻</text>
                                    </g>
                                ))}
                            </svg>
                            <p style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)', marginTop: '8px' }}>
                                Ogni peer connesso a tutti gli altri. Tool: <strong style={{ color: MODULE_COLOR }}>Tailscale</strong>, <strong style={{ color: MODULE_COLOR }}>Netmaker</strong>, <strong style={{ color: MODULE_COLOR }}>Headscale</strong>.
                            </p>
                        </Glow>
                    </div>
                </div>
                <Box type="info" title="Soluzioni mesh basate su WireGuard">
                    <strong>Tailscale</strong>: mesh VPN gestita, NAT traversal automatico, SSO integrato. Usa WireGuard internamente.<br/>
                    <strong>Netmaker</strong>: self-hosted, crea reti mesh WireGuard automaticamente.<br/>
                    <strong>Headscale</strong>: server Tailscale open-source self-hosted.
                </Box>
            </div>
        );

        const SlideBestPractices = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Best Practices e <span style={{ color: MODULE_COLOR }}>Riepilogo</span>
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '20px', marginBottom: '24px' }} className="slide-grid">
                    <Box type="success" title="WireGuard — Quando usarlo">
                        <ul style={{ listStyle: 'none', padding: 0 }}>
                            {['Nuovo deployment senza vincoli legacy', 'VPN mobile (roaming, batteria)', 'Performance critiche (gaming, streaming)', 'Semplicità di gestione prioritaria', 'Mesh VPN (Tailscale, Netmaker)'].map((item, i) => <li key={i} style={{ marginBottom: '8px' }}><span style={{ color: colors.success }}>✓</span> {item}</li>)}
                        </ul>
                    </Box>
                    <Box type="warn" title="Quando preferire alternative">
                        <ul style={{ listStyle: 'none', padding: 0 }}>
                            {['Enterprise con infrastruttura IPsec esistente', 'Necessità di negoziazione cipher (compliance)', 'Ambienti con TCP 443 obbligatorio → OpenVPN', 'Requisito di logging dettagliato (WG è stateless)', 'Hardware crypto offload (ASA, router HW)'].map((item, i) => <li key={i} style={{ marginBottom: '8px' }}><span style={{ color: colors.warn }}>⚠️</span> {item}</li>)}
                        </ul>
                    </Box>
                </div>
                <Glow>
                    <h3 style={{ color: MODULE_COLOR, fontSize: 'clamp(16px, 1.5vw, 22px)', marginBottom: '14px' }}>📋 Riepilogo Modulo 4</h3>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '14px' }} className="slide-grid">
                        {[
                            { label: 'WireGuard', value: '~4000 righe, kernel-level, 1-RTT' },
                            { label: 'Crypto', value: 'ChaCha20-Poly1305 + Curve25519 + BLAKE2s' },
                            { label: 'Config', value: 'Solo chiavi + IP, nessuna CA/certificati' },
                            { label: 'vs IPsec/OpenVPN', value: '3-4x throughput, latenza minima' },
                            { label: 'Commerciali vs Self', value: 'Controllo vs comodità — dipende dall\'uso' },
                            { label: 'Prossimo', value: 'Modulo 5: Scenari Pratici →' }
                        ].map((item, i) => (
                            <div key={i} style={{ padding: '10px', borderRadius: '8px', background: colors.bgLight }}>
                                <div style={{ color: MODULE_COLOR, fontWeight: 700, fontSize: 'clamp(11px, 1vw, 14px)', marginBottom: '4px' }}>{item.label}</div>
                                <div style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>{item.value}</div>
                            </div>
                        ))}
                    </div>
                </Glow>
            </div>
        );

        const slides = [SlideTitolo, SlidePerche, SlideConfronto, SlideConfig, SlideCrypto, SlideCommerciali, SlideSimPerformance, SlideMesh, SlideBestPractices];

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const total = slides.length;
            const goNext = useCallback(() => setCurrentSlide(s => Math.min(s + 1, total - 1)), [total]);
            const goPrev = useCallback(() => setCurrentSlide(s => Math.max(s - 1, 0)), []);
            const goIndex = useCallback(() => { window.location.href = 'index.html'; }, []);

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
                    if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
                    if (e.key === 'Escape') goIndex();
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [goNext, goPrev, goIndex]);

            const SlideComponent = slides[currentSlide];
            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                    <div style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100, background: `${colors.bg}ee`, backdropFilter: 'blur(12px)', borderBottom: `1px solid ${colors.border}`, padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <a href="index.html" style={{ color: colors.textDim, textDecoration: 'none', fontSize: 'clamp(12px, 1.1vw, 15px)' }}>← Indice</a>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <span style={{ color: MODULE_COLOR, fontWeight: 700, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>M{MODULE_NUM}</span>
                            <span style={{ color: colors.text, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>{MODULE_TITLE}</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <span style={{ color: colors.textMuted, fontSize: 'clamp(11px, 1vw, 14px)' }}>{currentSlide + 1} / {total}</span>
                            <div style={{ width: '80px', height: '4px', background: colors.bgLight, borderRadius: '2px', overflow: 'hidden' }}>
                                <div style={{ width: `${((currentSlide + 1) / total) * 100}%`, height: '100%', background: MODULE_COLOR, borderRadius: '2px', transition: 'width 0.3s' }} />
                            </div>
                        </div>
                    </div>
                    <div style={{ flex: 1, maxWidth: '2200px', width: '94%', margin: '0 auto', padding: '70px 0 80px' }}><SlideComponent /></div>
                    <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 100, background: `${colors.bg}ee`, backdropFilter: 'blur(12px)', borderTop: `1px solid ${colors.border}`, padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <button onClick={goPrev} disabled={currentSlide === 0} style={{ padding: '8px 20px', borderRadius: '8px', border: `1px solid ${colors.border}`, background: currentSlide === 0 ? 'transparent' : colors.bgLight, color: currentSlide === 0 ? colors.textMuted : colors.text, cursor: currentSlide === 0 ? 'default' : 'pointer', fontSize: 'clamp(12px, 1.1vw, 15px)', fontFamily: 'Inter' }}>← Indietro</button>
                        <div style={{ display: 'flex', gap: '16px', fontSize: 'clamp(11px, 1vw, 14px)' }}>
                            {currentSlide === 0 && PREV_MODULE && <a href={PREV_MODULE.file} style={{ color: colors.textMuted, textDecoration: 'none' }}>← {PREV_MODULE.title}</a>}
                            {currentSlide === total - 1 && NEXT_MODULE && <a href={NEXT_MODULE.file} style={{ color: MODULE_COLOR, textDecoration: 'none', fontWeight: 600 }}>{NEXT_MODULE.title} →</a>}
                        </div>
                        <button onClick={goNext} disabled={currentSlide === total - 1} style={{ padding: '8px 20px', borderRadius: '8px', border: `1px solid ${MODULE_COLOR}`, background: currentSlide === total - 1 ? 'transparent' : `${MODULE_COLOR}20`, color: currentSlide === total - 1 ? colors.textMuted : MODULE_COLOR, cursor: currentSlide === total - 1 ? 'default' : 'pointer', fontSize: 'clamp(12px, 1.1vw, 15px)', fontFamily: 'Inter', fontWeight: 600 }}>Avanti →</button>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
