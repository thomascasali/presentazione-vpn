<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulo 3 - VPN SSL/TLS e OpenVPN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e17; color: #f1f5f9; min-height: 100vh; overflow-x: hidden; }
        @media (max-width: 1024px) { html { font-size: 15px; } }
        @media (max-width: 768px) { html { font-size: 14px; } .slide-grid { grid-template-columns: 1fr !important; } svg { max-width: 100% !important; } pre { white-space: pre-wrap !important; word-break: break-all !important; } }
        @media (max-width: 480px) { html { font-size: 13px; } button { width: 100% !important; } }
        @media (min-width: 1600px) { html { font-size: 18px; } }
        @media (min-width: 2000px) { html { font-size: 20px; } }
        @media (min-width: 2400px) { html { font-size: 22px; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const colors = {
            bg: '#0a0e17', bgCard: '#111827', bgLight: '#1e293b',
            accent: '#f59e0b', accentAlt: '#0ea5e9',
            text: '#f1f5f9', textDim: '#94a3b8', textMuted: '#64748b',
            border: '#334155',
            success: '#22c55e', danger: '#ef4444', warn: '#f59e0b',
            info: '#0ea5e9', purple: '#a78bfa', cyan: '#22d3ee'
        };

        const MODULE_NUM = 3;
        const MODULE_TITLE = 'VPN SSL/TLS e OpenVPN';
        const MODULE_COLOR = '#f59e0b';
        const PREV_MODULE = { title: 'IPsec in Dettaglio', file: 'modulo2-ipsec.html' };
        const NEXT_MODULE = { title: 'WireGuard e VPN Moderne', file: 'modulo4-wireguard.html' };

        const Code = ({ children, title }) => (
            <pre style={{ background: '#0d1117', border: `1px solid ${colors.border}`, borderRadius: '12px', padding: 'clamp(14px, 1.5vw, 20px)', fontSize: 'clamp(12px, 1.1vw, 15px)', fontFamily: "'JetBrains Mono', monospace", overflowX: 'auto', lineHeight: 1.7 }}>
                {title && <div style={{ color: MODULE_COLOR, paddingBottom: '10px', fontWeight: 600 }}>{'// '}{title}</div>}
                <code>{children}</code>
            </pre>
        );

        const Box = ({ type, title, children }) => {
            const colorMap = { info: colors.info, warn: colors.warn, danger: colors.danger, success: colors.success, tip: MODULE_COLOR };
            const iconMap = { info: 'ℹ️', warn: '⚠️', danger: '❌', success: '✅', tip: '💡' };
            return (
                <div style={{ borderLeft: `4px solid ${colorMap[type] || colors.info}`, padding: 'clamp(14px, 1.5vw, 20px)', margin: '16px 0', borderRadius: '0 12px 12px 0', background: colors.bgCard }}>
                    {title && <div style={{ color: colorMap[type], fontWeight: 700, marginBottom: '8px', fontSize: 'clamp(14px, 1.3vw, 18px)' }}>{iconMap[type]} {title}</div>}
                    <div style={{ color: colors.textDim, lineHeight: 1.7, fontSize: 'clamp(13px, 1.2vw, 17px)' }}>{children}</div>
                </div>
            );
        };

        const Table = ({ headers, rows }) => (
            <div style={{ overflowX: 'auto', margin: '16px 0' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 'clamp(12px, 1.1vw, 16px)' }}>
                    <thead><tr>{headers.map((h, i) => <th key={i} style={{ padding: 'clamp(8px, 1vw, 14px)', background: colors.bgLight, color: MODULE_COLOR, fontWeight: 700, textAlign: 'left', borderBottom: `2px solid ${MODULE_COLOR}40` }}>{h}</th>)}</tr></thead>
                    <tbody>{rows.map((row, i) => <tr key={i}>{row.map((cell, j) => <td key={j} style={{ padding: 'clamp(8px, 1vw, 14px)', borderBottom: `1px solid ${colors.border}`, color: colors.textDim, background: i % 2 === 0 ? 'transparent' : `${colors.bgLight}40` }}>{cell}</td>)}</tr>)}</tbody>
                </table>
            </div>
        );

        const Glow = ({ children, color }) => (
            <div style={{ border: `2px solid ${color || MODULE_COLOR}`, borderRadius: '16px', padding: 'clamp(16px, 2vw, 24px)', boxShadow: `0 0 25px ${(color || MODULE_COLOR)}30`, background: colors.bgCard }}>{children}</div>
        );

        // ─── SLIDE ───
        const SlideTitolo = () => (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '70vh', textAlign: 'center', gap: '20px' }}>
                <div style={{ fontSize: '72px' }}>📜</div>
                <div style={{ fontSize: 'clamp(12px, 1.1vw, 15px)', color: MODULE_COLOR, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '2px' }}>Modulo {MODULE_NUM}</div>
                <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(36px, 4vw, 68px)', fontWeight: 700, background: `linear-gradient(135deg, ${MODULE_COLOR}, ${colors.danger})`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                    {MODULE_TITLE}
                </h1>
                <p style={{ fontSize: 'clamp(16px, 1.5vw, 22px)', color: colors.textDim, maxWidth: '600px' }}>
                    SSL/TLS per VPN, architettura OpenVPN, configurazione e infrastruttura PKI
                </p>
            </div>
        );

        const SlideSSLTLS = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Come funziona <span style={{ color: MODULE_COLOR }}>SSL/TLS</span> per le VPN
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '24px' }} className="slide-grid">
                    <div>
                        <Box type="info" title="SSL/TLS VPN">
                            Utilizza il protocollo <strong>TLS</strong> (successore di SSL) per creare un tunnel crittografato.
                            Opera a <strong style={{ color: colors.text }}>livello trasporto (L4-L7)</strong>, tipicamente su <strong style={{ color: MODULE_COLOR }}>porta TCP 443</strong> (HTTPS).
                        </Box>
                        <Glow color={MODULE_COLOR}>
                            <h4 style={{ color: MODULE_COLOR, marginBottom: '10px' }}>Vantaggi chiave</h4>
                            {[
                                'Attraversa firewall e proxy (porta 443 = HTTPS)',
                                'Non richiede client dedicato (browser-based possibile)',
                                'Facile da configurare per Remote Access',
                                'Granularità: può proteggere singole applicazioni',
                                'Certificati X.509 standard, PKI consolidata'
                            ].map((item, i) => (
                                <div key={i} style={{ display: 'flex', gap: '8px', marginBottom: '8px', color: colors.textDim, fontSize: 'clamp(13px, 1.2vw, 16px)' }}>
                                    <span style={{ color: colors.success }}>✓</span> {item}
                                </div>
                            ))}
                        </Glow>
                    </div>
                    <div>
                        <svg viewBox="0 0 450 350" style={{ width: '100%', maxWidth: '450px' }}>
                            <text x="225" y="25" textAnchor="middle" fill={colors.text} fontSize="14" fontWeight="700" fontFamily="Space Grotesk">TLS Handshake per VPN</text>

                            {/* Client */}
                            <rect x="20" y="45" width="100" height="40" rx="8" fill={colors.bgCard} stroke={colors.info} strokeWidth="2" />
                            <text x="70" y="70" textAnchor="middle" fill={colors.info} fontSize="12" fontWeight="600" fontFamily="Inter">Client VPN</text>

                            {/* Server */}
                            <rect x="330" y="45" width="100" height="40" rx="8" fill={colors.bgCard} stroke={MODULE_COLOR} strokeWidth="2" />
                            <text x="380" y="70" textAnchor="middle" fill={MODULE_COLOR} fontSize="12" fontWeight="600" fontFamily="Inter">Server VPN</text>

                            {/* Step 1 */}
                            <line x1="120" y1="105" x2="330" y2="105" stroke={colors.info} strokeWidth="1.5" markerEnd="url(#arr-r)" />
                            <text x="225" y="100" textAnchor="middle" fill={colors.info} fontSize="10" fontFamily="Inter" fontWeight="600">1. ClientHello (cipher suites, random)</text>

                            {/* Step 2 */}
                            <line x1="330" y1="135" x2="120" y2="135" stroke={MODULE_COLOR} strokeWidth="1.5" markerEnd="url(#arr-l)" />
                            <text x="225" y="130" textAnchor="middle" fill={MODULE_COLOR} fontSize="10" fontFamily="Inter" fontWeight="600">2. ServerHello + Certificato + KeyExchange</text>

                            {/* Step 3 */}
                            <line x1="120" y1="165" x2="330" y2="165" stroke={colors.info} strokeWidth="1.5" markerEnd="url(#arr-r)" />
                            <text x="225" y="160" textAnchor="middle" fill={colors.info} fontSize="10" fontFamily="Inter" fontWeight="600">3. Verifica cert + KeyExchange client</text>

                            {/* Step 4 */}
                            <line x1="120" y1="195" x2="330" y2="195" stroke={colors.success} strokeWidth="2" />
                            <line x1="330" y1="195" x2="120" y2="195" stroke={colors.success} strokeWidth="2" />
                            <text x="225" y="190" textAnchor="middle" fill={colors.success} fontSize="10" fontFamily="Inter" fontWeight="600">4. Finished — Master Secret condiviso</text>

                            {/* Tunnel */}
                            <rect x="80" y="215" width="290" height="40" rx="20" fill={`${colors.success}10`} stroke={colors.success} strokeWidth="2" />
                            <text x="225" y="240" textAnchor="middle" fill={colors.success} fontSize="12" fontWeight="700" fontFamily="Inter">🔒 Tunnel TLS attivo (AES-256-GCM)</text>

                            {/* Data flow */}
                            <rect x="80" y="270" width="290" height="30" rx="8" fill={`${MODULE_COLOR}10`} stroke={MODULE_COLOR} strokeWidth="1" />
                            <text x="225" y="290" textAnchor="middle" fill={MODULE_COLOR} fontSize="10" fontFamily="Inter">Traffico VPN crittografato ↔</text>

                            <text x="225" y="330" textAnchor="middle" fill={colors.textMuted} fontSize="10" fontFamily="Inter">Tutto su TCP/UDP 443 — indistinguibile da HTTPS</text>

                            <defs>
                                <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill={colors.info} /></marker>
                                <marker id="arr-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill={MODULE_COLOR} /></marker>
                            </defs>
                        </svg>
                    </div>
                </div>
            </div>
        );

        const SlideConfronto = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    <span style={{ color: colors.info }}>IPsec</span> vs <span style={{ color: MODULE_COLOR }}>SSL/TLS</span> VPN
                </h2>
                <Table
                    headers={['Caratteristica', 'IPsec VPN', 'SSL/TLS VPN']}
                    rows={[
                        ['Livello OSI', 'Rete (L3)', 'Trasporto/Applicazione (L4-L7)'],
                        ['Porta', 'ESP (proto 50), UDP 500/4500', <strong style={{ color: MODULE_COLOR }}>TCP/UDP 443</strong>],
                        ['Client', 'Richiede client dedicato', 'Browser o client leggero'],
                        ['Firewall traversal', <span style={{ color: colors.danger }}>Spesso bloccato</span>, <span style={{ color: colors.success }}>Passa ovunque (= HTTPS)</span>],
                        ['Granularità', 'Rete intera (tutti i servizi)', 'Singole app o rete intera'],
                        ['Configurazione', 'Complessa (IKE, SA, crypto map)', 'Più semplice (certificati TLS)'],
                        ['Performance', 'Ottima (kernel-level)', 'Buona (user-space in OpenVPN)'],
                        ['Uso tipico', 'Site-to-Site enterprise', 'Remote Access, BYOD'],
                        ['NAT', 'Problematico (NAT-T necessario)', <span style={{ color: colors.success }}>Nessun problema</span>]
                    ]}
                />
                <Box type="tip" title="Quando usare quale?">
                    <strong>IPsec</strong>: collegamento permanente tra sedi con hardware dedicato.<br/>
                    <strong>SSL/TLS</strong>: accesso remoto per dipendenti, ambienti con firewall restrittivi, BYOD.
                </Box>
            </div>
        );

        const SlideOpenVPN = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    <span style={{ color: MODULE_COLOR }}>OpenVPN</span>: architettura
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '24px' }} className="slide-grid">
                    <div>
                        <Box type="info" title="Cos'è OpenVPN?">
                            Software open-source che implementa una VPN SSL/TLS. Può operare in modalità
                            <strong style={{ color: colors.text }}> TUN</strong> (routing L3) o <strong style={{ color: colors.text }}>TAP</strong> (bridging L2).
                            Usa la libreria <strong>OpenSSL</strong> per la crittografia.
                        </Box>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginTop: '16px' }}>
                            <Glow color={colors.success}>
                                <h4 style={{ color: colors.success, fontSize: 'clamp(14px, 1.3vw, 18px)', marginBottom: '8px' }}>TUN (L3)</h4>
                                <p style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)', lineHeight: 1.6 }}>
                                    Interfaccia punto-punto<br/>
                                    Routing di pacchetti IP<br/>
                                    <strong>Più comune e performante</strong>
                                </p>
                            </Glow>
                            <Glow color={colors.purple}>
                                <h4 style={{ color: colors.purple, fontSize: 'clamp(14px, 1.3vw, 18px)', marginBottom: '8px' }}>TAP (L2)</h4>
                                <p style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)', lineHeight: 1.6 }}>
                                    Interfaccia Ethernet virtuale<br/>
                                    Bridge di frame L2<br/>
                                    Serve per broadcast/multicast
                                </p>
                            </Glow>
                        </div>
                    </div>
                    <div>
                        <svg viewBox="0 0 450 340" style={{ width: '100%', maxWidth: '450px' }}>
                            <text x="225" y="20" textAnchor="middle" fill={colors.text} fontSize="14" fontWeight="700" fontFamily="Space Grotesk">Architettura OpenVPN</text>

                            {/* Client side */}
                            <rect x="15" y="40" width="140" height="120" rx="12" fill={`${colors.info}08`} stroke={colors.info} strokeWidth="1.5" strokeDasharray="6,3" />
                            <text x="85" y="60" textAnchor="middle" fill={colors.info} fontSize="11" fontWeight="700" fontFamily="Inter">Client</text>
                            <rect x="30" y="70" width="110" height="25" rx="5" fill={colors.bgLight} stroke={colors.border} strokeWidth="1" />
                            <text x="85" y="87" textAnchor="middle" fill={colors.textDim} fontSize="9" fontFamily="Inter">App (browser, ecc.)</text>
                            <rect x="30" y="100" width="110" height="25" rx="5" fill={`${colors.success}15`} stroke={colors.success} strokeWidth="1" />
                            <text x="85" y="117" textAnchor="middle" fill={colors.success} fontSize="9" fontFamily="Inter">tun0 (10.8.0.2)</text>
                            <rect x="30" y="130" width="110" height="25" rx="5" fill={`${MODULE_COLOR}15`} stroke={MODULE_COLOR} strokeWidth="1" />
                            <text x="85" y="147" textAnchor="middle" fill={MODULE_COLOR} fontSize="9" fontFamily="Inter">OpenVPN Client</text>

                            {/* Internet */}
                            <ellipse cx="225" y="130" rx="50" ry="30" fill="none" stroke={colors.border} strokeWidth="1.5" strokeDasharray="4,3" />
                            <text x="225" y="135" textAnchor="middle" fill={colors.textMuted} fontSize="10" fontFamily="Inter">🌐 Internet</text>
                            <line x1="155" y1="130" x2="175" y2="130" stroke={MODULE_COLOR} strokeWidth="2" />
                            <line x1="275" y1="130" x2="295" y2="130" stroke={MODULE_COLOR} strokeWidth="2" />
                            <text x="225" y="170" textAnchor="middle" fill={MODULE_COLOR} fontSize="9" fontFamily="Inter">UDP/TCP 1194 (o 443)</text>

                            {/* Server side */}
                            <rect x="295" y="40" width="140" height="120" rx="12" fill={`${MODULE_COLOR}08`} stroke={MODULE_COLOR} strokeWidth="1.5" strokeDasharray="6,3" />
                            <text x="365" y="60" textAnchor="middle" fill={MODULE_COLOR} fontSize="11" fontWeight="700" fontFamily="Inter">Server</text>
                            <rect x="310" y="70" width="110" height="25" rx="5" fill={`${MODULE_COLOR}15`} stroke={MODULE_COLOR} strokeWidth="1" />
                            <text x="365" y="87" textAnchor="middle" fill={MODULE_COLOR} fontSize="9" fontFamily="Inter">OpenVPN Server</text>
                            <rect x="310" y="100" width="110" height="25" rx="5" fill={`${colors.success}15`} stroke={colors.success} strokeWidth="1" />
                            <text x="365" y="117" textAnchor="middle" fill={colors.success} fontSize="9" fontFamily="Inter">tun0 (10.8.0.1)</text>
                            <rect x="310" y="130" width="110" height="25" rx="5" fill={colors.bgLight} stroke={colors.border} strokeWidth="1" />
                            <text x="365" y="147" textAnchor="middle" fill={colors.textDim} fontSize="9" fontFamily="Inter">LAN (192.168.1.0/24)</text>

                            {/* Tunnel */}
                            <rect x="60" y="195" width="330" height="30" rx="15" fill={`${MODULE_COLOR}10`} stroke={MODULE_COLOR} strokeWidth="2" />
                            <text x="225" y="215" textAnchor="middle" fill={MODULE_COLOR} fontSize="11" fontWeight="600" fontFamily="Inter">🔒 Tunnel TLS (AES-256-GCM)</text>

                            {/* Info boxes */}
                            <rect x="30" y="245" width="180" height="80" rx="8" fill={colors.bgLight} stroke={colors.border} strokeWidth="1" />
                            <text x="120" y="265" textAnchor="middle" fill={colors.text} fontSize="10" fontWeight="600" fontFamily="Inter">File necessari client:</text>
                            <text x="120" y="282" textAnchor="middle" fill={colors.textDim} fontSize="9" fontFamily="Inter">• client.ovpn (config)</text>
                            <text x="120" y="296" textAnchor="middle" fill={colors.textDim} fontSize="9" fontFamily="Inter">• ca.crt + client.crt/.key</text>
                            <text x="120" y="310" textAnchor="middle" fill={colors.textDim} fontSize="9" fontFamily="Inter">• ta.key (HMAC anti-DoS)</text>

                            <rect x="240" y="245" width="180" height="80" rx="8" fill={colors.bgLight} stroke={colors.border} strokeWidth="1" />
                            <text x="330" y="265" textAnchor="middle" fill={colors.text} fontSize="10" fontWeight="600" fontFamily="Inter">File necessari server:</text>
                            <text x="330" y="282" textAnchor="middle" fill={colors.textDim} fontSize="9" fontFamily="Inter">• server.conf (config)</text>
                            <text x="330" y="296" textAnchor="middle" fill={colors.textDim} fontSize="9" fontFamily="Inter">• ca.crt + server.crt/.key</text>
                            <text x="330" y="310" textAnchor="middle" fill={colors.textDim} fontSize="9" fontFamily="Inter">• dh.pem + ta.key</text>
                        </svg>
                    </div>
                </div>
            </div>
        );

        const SlideConfigServer = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Configurazione <span style={{ color: MODULE_COLOR }}>OpenVPN Server</span>
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '20px' }} className="slide-grid">
                    <Code title="server.conf">
{`# Porta e protocollo
port 1194
proto udp
dev tun

# Certificati e chiavi
ca   /etc/openvpn/ca.crt
cert /etc/openvpn/server.crt
key  /etc/openvpn/server.key
dh   /etc/openvpn/dh2048.pem

# Rete VPN
server 10.8.0.0 255.255.255.0

# Routing verso LAN aziendale
push "route 192.168.1.0 255.255.255.0"

# DNS push al client
push "dhcp-option DNS 192.168.1.1"

# Crittografia
cipher AES-256-GCM
auth SHA256
tls-auth ta.key 0

# Keepalive e compressione
keepalive 10 120
compress lz4-v2
push "compress lz4-v2"

# Sicurezza
user nobody
group nogroup
persist-key
persist-tun

# Logging
status /var/log/openvpn-status.log
log-append /var/log/openvpn.log
verb 3`}</Code>
                    <div>
                        <Code title="client.ovpn">
{`client
dev tun
proto udp
remote vpn.azienda.it 1194
resolv-retry infinite
nobind

# Certificati (inline o file)
ca   ca.crt
cert client1.crt
key  client1.key

# Crittografia
cipher AES-256-GCM
auth SHA256
tls-auth ta.key 1

# Sicurezza
remote-cert-tls server
persist-key
persist-tun
verb 3`}</Code>
                        <Box type="tip" title="File .ovpn inline">
                            Si possono incorporare i certificati direttamente nel file .ovpn usando i tag
                            <code style={{ fontFamily: "'JetBrains Mono', monospace" }}> &lt;ca&gt;...&lt;/ca&gt;</code>,
                            <code style={{ fontFamily: "'JetBrains Mono', monospace" }}> &lt;cert&gt;...&lt;/cert&gt;</code>,
                            <code style={{ fontFamily: "'JetBrains Mono', monospace" }}> &lt;key&gt;...&lt;/key&gt;</code>.
                            Questo permette di distribuire un singolo file al client.
                        </Box>
                    </div>
                </div>
            </div>
        );

        const SlidePKI = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Certificati e <span style={{ color: MODULE_COLOR }}>PKI</span>
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '24px' }} className="slide-grid">
                    <div>
                        <svg viewBox="0 0 400 320" style={{ width: '100%', maxWidth: '400px' }}>
                            <text x="200" y="25" textAnchor="middle" fill={colors.text} fontSize="14" fontWeight="700" fontFamily="Space Grotesk">Infrastruttura PKI OpenVPN</text>

                            {/* CA */}
                            <rect x="120" y="40" width="160" height="55" rx="12" fill={`${colors.danger}12`} stroke={colors.danger} strokeWidth="2" />
                            <text x="200" y="65" textAnchor="middle" fill={colors.danger} fontSize="13" fontWeight="700" fontFamily="Inter">🏛️ CA (Root)</text>
                            <text x="200" y="83" textAnchor="middle" fill={colors.textDim} fontSize="10" fontFamily="Inter">ca.crt + ca.key (SEGRETA!)</text>

                            {/* Lines to server and client */}
                            <line x1="170" y1="95" x2="100" y2="140" stroke={colors.danger} strokeWidth="1.5" strokeDasharray="4,3" />

                        ].map((item, i) => (
                            <div key={i} style={{ padding: '10px', borderRadius: '8px', background: colors.bgLight }}>
                                <div style={{ color: MODULE_COLOR, fontWeight: 700, fontSize: 'clamp(11px, 1vw, 14px)', marginBottom: '4px' }}>{item.label}</div>
                                <div style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>{item.value}</div>
                            </div>
                        ))}
                    </div>
                </Glow>
            </div>
        );

        // ─── SLIDE ARRAY ───
        const slides = [SlideTitolo, SlideSSLTLS, SlideConfronto, SlideOpenVPN, SlideConfigServer, SlidePKI, SlideRevoca, SlideSicurezza, SlideSimConfig, SlideSimTLSHandshake, SlideBestPractices];

        // ─── APP ───
        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const total = slides.length;
            const goNext = useCallback(() => setCurrentSlide(s => Math.min(s + 1, total - 1)), [total]);
            const goPrev = useCallback(() => setCurrentSlide(s => Math.max(s - 1, 0)), []);
            const goIndex = useCallback(() => { window.location.href = 'index.html'; }, []);

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
                    if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
                    if (e.key === 'Escape') goIndex();
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [goNext, goPrev, goIndex]);

            const SlideComponent = slides[currentSlide];
            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                    <div style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100, background: `${colors.bg}ee`, backdropFilter: 'blur(12px)', borderBottom: `1px solid ${colors.border}`, padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <a href="index.html" style={{ color: colors.textDim, textDecoration: 'none', fontSize: 'clamp(12px, 1.1vw, 15px)' }}>← Indice</a>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <span style={{ color: MODULE_COLOR, fontWeight: 700, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>M{MODULE_NUM}</span>
                            <span style={{ color: colors.text, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>{MODULE_TITLE}</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <span style={{ color: colors.textMuted, fontSize: 'clamp(11px, 1vw, 14px)' }}>{currentSlide + 1} / {total}</span>
                            <div style={{ width: '80px', height: '4px', background: colors.bgLight, borderRadius: '2px', overflow: 'hidden' }}>
                                <div style={{ width: `${((currentSlide + 1) / total) * 100}%`, height: '100%', background: MODULE_COLOR, borderRadius: '2px', transition: 'width 0.3s' }} />
                            </div>
                        </div>
                    </div>
                    <div style={{ flex: 1, maxWidth: '2200px', width: '94%', margin: '0 auto', padding: '70px 0 80px' }}><SlideComponent /></div>
                    <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 100, background: `${colors.bg}ee`, backdropFilter: 'blur(12px)', borderTop: `1px solid ${colors.border}`, padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <button onClick={goPrev} disabled={currentSlide === 0} style={{ padding: '8px 20px', borderRadius: '8px', border: `1px solid ${colors.border}`, background: currentSlide === 0 ? 'transparent' : colors.bgLight, color: currentSlide === 0 ? colors.textMuted : colors.text, cursor: currentSlide === 0 ? 'default' : 'pointer', fontSize: 'clamp(12px, 1.1vw, 15px)', fontFamily: 'Inter' }}>← Indietro</button>
                        <div style={{ display: 'flex', gap: '16px', fontSize: 'clamp(11px, 1vw, 14px)' }}>
                            {currentSlide === 0 && PREV_MODULE && <a href={PREV_MODULE.file} style={{ color: colors.textMuted, textDecoration: 'none' }}>← {PREV_MODULE.title}</a>}
                            {currentSlide === total - 1 && NEXT_MODULE && <a href={NEXT_MODULE.file} style={{ color: MODULE_COLOR, textDecoration: 'none', fontWeight: 600 }}>{NEXT_MODULE.title} →</a>}
                        </div>
                        <button onClick={goNext} disabled={currentSlide === total - 1} style={{ padding: '8px 20px', borderRadius: '8px', border: `1px solid ${MODULE_COLOR}`, background: currentSlide === total - 1 ? 'transparent' : `${MODULE_COLOR}20`, color: currentSlide === total - 1 ? colors.textMuted : MODULE_COLOR, cursor: currentSlide === total - 1 ? 'default' : 'pointer', fontSize: 'clamp(12px, 1.1vw, 15px)', fontFamily: 'Inter', fontWeight: 600 }}>Avanti →</button>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
