<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulo 2 - IPsec in Dettaglio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e17; color: #f1f5f9; min-height: 100vh; overflow-x: hidden; }
        @media (max-width: 1024px) { html { font-size: 15px; } }
        @media (max-width: 768px) { html { font-size: 14px; } .slide-grid { grid-template-columns: 1fr !important; } svg { max-width: 100% !important; } pre { white-space: pre-wrap !important; word-break: break-all !important; } }
        @media (max-width: 480px) { html { font-size: 13px; } button { width: 100% !important; } }
        @media (min-width: 1600px) { html { font-size: 18px; } }
        @media (min-width: 2000px) { html { font-size: 20px; } }
        @media (min-width: 2400px) { html { font-size: 22px; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const colors = {
            bg: '#0a0e17', bgCard: '#111827', bgLight: '#1e293b',
            accent: '#0ea5e9', accentAlt: '#00d4aa',
            text: '#f1f5f9', textDim: '#94a3b8', textMuted: '#64748b',
            border: '#334155',
            success: '#22c55e', danger: '#ef4444', warn: '#f59e0b',
            info: '#0ea5e9', purple: '#a78bfa', cyan: '#22d3ee'
        };

        const MODULE_NUM = 2;
        const MODULE_TITLE = 'IPsec in Dettaglio';
        const MODULE_COLOR = '#0ea5e9';
        const PREV_MODULE = { title: 'Fondamenti VPN', file: 'modulo1-fondamenti-vpn.html' };
        const NEXT_MODULE = { title: 'VPN SSL/TLS e OpenVPN', file: 'modulo3-openvpn.html' };

        // ─── Componenti Riutilizzabili ───
        const Code = ({ children, title }) => (
            <pre style={{ background: '#0d1117', border: `1px solid ${colors.border}`, borderRadius: '12px', padding: 'clamp(14px, 1.5vw, 20px)', fontSize: 'clamp(12px, 1.1vw, 15px)', fontFamily: "'JetBrains Mono', monospace", overflowX: 'auto', lineHeight: 1.7 }}>
                {title && <div style={{ color: MODULE_COLOR, paddingBottom: '10px', fontWeight: 600 }}>{'// '}{title}</div>}
                <code>{children}</code>
            </pre>
        );

        const Box = ({ type, title, children }) => {
            const colorMap = { info: colors.info, warn: colors.warn, danger: colors.danger, success: colors.success, tip: MODULE_COLOR };
            const iconMap = { info: 'ℹ️', warn: '⚠️', danger: '❌', success: '✅', tip: '💡' };
            return (
                <div style={{ borderLeft: `4px solid ${colorMap[type] || colors.info}`, padding: 'clamp(14px, 1.5vw, 20px)', margin: '16px 0', borderRadius: '0 12px 12px 0', background: colors.bgCard }}>
                    {title && <div style={{ color: colorMap[type], fontWeight: 700, marginBottom: '8px', fontSize: 'clamp(14px, 1.3vw, 18px)' }}>{iconMap[type]} {title}</div>}
                    <div style={{ color: colors.textDim, lineHeight: 1.7, fontSize: 'clamp(13px, 1.2vw, 17px)' }}>{children}</div>
                </div>
            );
        };

        const Table = ({ headers, rows }) => (
            <div style={{ overflowX: 'auto', margin: '16px 0' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 'clamp(12px, 1.1vw, 16px)' }}>
                    <thead><tr>{headers.map((h, i) => (
                        <th key={i} style={{ padding: 'clamp(8px, 1vw, 14px)', background: colors.bgLight, color: MODULE_COLOR, fontWeight: 700, textAlign: 'left', borderBottom: `2px solid ${MODULE_COLOR}40` }}>{h}</th>
                    ))}</tr></thead>
                    <tbody>{rows.map((row, i) => (
                        <tr key={i}>{row.map((cell, j) => (
                            <td key={j} style={{ padding: 'clamp(8px, 1vw, 14px)', borderBottom: `1px solid ${colors.border}`, color: colors.textDim, background: i % 2 === 0 ? 'transparent' : `${colors.bgLight}40` }}>{cell}</td>
                        ))}</tr>
                    ))}</tbody>
                </table>
            </div>
        );

        const Glow = ({ children, color }) => (
            <div style={{ border: `2px solid ${color || MODULE_COLOR}`, borderRadius: '16px', padding: 'clamp(16px, 2vw, 24px)', boxShadow: `0 0 25px ${(color || MODULE_COLOR)}30`, background: colors.bgCard }}>
                {children}
            </div>
        );

        // ─── SLIDE ───

        const SlideTitolo = () => (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '70vh', textAlign: 'center', gap: '20px' }}>
                <div style={{ fontSize: '72px' }}>🛡️</div>
                <div style={{ fontSize: 'clamp(12px, 1.1vw, 15px)', color: MODULE_COLOR, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '2px' }}>Modulo {MODULE_NUM}</div>
                <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(36px, 4vw, 68px)', fontWeight: 700, background: `linear-gradient(135deg, ${MODULE_COLOR}, ${colors.purple})`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                    {MODULE_TITLE}
                </h1>
                <p style={{ fontSize: 'clamp(16px, 1.5vw, 22px)', color: colors.textDim, maxWidth: '600px' }}>
                    Architettura IPsec, protocolli AH e ESP, IKE, Security Association e configurazione Cisco
                </p>
            </div>
        );

        const SlideArchitettura = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Architettura <span style={{ color: MODULE_COLOR }}>IPsec</span>
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '24px' }} className="slide-grid">
                    <div>
                        <Box type="info" title="Cos'è IPsec?">
                            <strong>Internet Protocol Security</strong> è una suite di protocolli che opera a <strong style={{ color: colors.text }}>livello rete (L3)</strong> dello stack OSI.
                            Fornisce crittografia, autenticazione e integrità per ogni pacchetto IP.
                        </Box>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '14px', marginTop: '16px' }}>
                            <Glow color={colors.warn}>
                                <h4 style={{ color: colors.warn, fontSize: 'clamp(14px, 1.3vw, 18px)', marginBottom: '8px' }}>🔍 AH</h4>
                                <p style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)', lineHeight: 1.6 }}>
                                    <strong>Authentication Header</strong><br/>
                                    Autenticazione + Integrità<br/>
                                    <span style={{ color: colors.danger }}>NO crittografia</span>
                                </p>
                            </Glow>
                            <Glow color={MODULE_COLOR}>
                                <h4 style={{ color: MODULE_COLOR, fontSize: 'clamp(14px, 1.3vw, 18px)', marginBottom: '8px' }}>🔒 ESP</h4>
                                <p style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)', lineHeight: 1.6 }}>
                                    <strong>Encapsulating Security Payload</strong><br/>
                                    Crittografia + Autenticazione + Integrità<br/>
                                    <span style={{ color: colors.success }}>Protocollo preferito</span>
                                </p>
                            </Glow>
                        </div>
                    </div>
                    <div>
                        <svg viewBox="0 0 450 360" style={{ width: '100%', maxWidth: '450px' }}>
                            {/* IPsec framework box */}
                            <rect x="20" y="10" width="410" height="340" rx="16" fill="none" stroke={MODULE_COLOR} strokeWidth="2" strokeDasharray="8,4" />
                            <text x="225" y="40" textAnchor="middle" fill={MODULE_COLOR} fontSize="16" fontWeight="700" fontFamily="Space Grotesk">Suite IPsec</text>

                            {/* AH */}
                            <rect x="40" y="60" width="170" height="70" rx="10" fill={`${colors.warn}12`} stroke={colors.warn} strokeWidth="2" />
                            <text x="125" y="85" textAnchor="middle" fill={colors.warn} fontSize="13" fontWeight="700" fontFamily="Inter">AH (Proto 51)</text>
                            <text x="125" y="105" textAnchor="middle" fill={colors.textDim} fontSize="10" fontFamily="Inter">Auth + Integrità</text>
                            <text x="125" y="120" textAnchor="middle" fill={colors.danger} fontSize="10" fontFamily="Inter">No crittografia</text>

                            {/* ESP */}
                            <rect x="240" y="60" width="170" height="70" rx="10" fill={`${MODULE_COLOR}12`} stroke={MODULE_COLOR} strokeWidth="2" />
                            <text x="325" y="85" textAnchor="middle" fill={MODULE_COLOR} fontSize="13" fontWeight="700" fontFamily="Inter">ESP (Proto 50)</text>
                            <text x="325" y="105" textAnchor="middle" fill={colors.textDim} fontSize="10" fontFamily="Inter">Crittografia + Auth</text>
                            <text x="325" y="120" textAnchor="middle" fill={colors.success} fontSize="10" fontFamily="Inter">✓ Il più usato</text>

                            {/* IKE */}
                            <rect x="40" y="150" width="370" height="60" rx="10" fill={`${colors.purple}12`} stroke={colors.purple} strokeWidth="2" />
                            <text x="225" y="175" textAnchor="middle" fill={colors.purple} fontSize="13" fontWeight="700" fontFamily="Inter">IKE — Internet Key Exchange (UDP 500/4500)</text>
                            <text x="225" y="195" textAnchor="middle" fill={colors.textDim} fontSize="10" fontFamily="Inter">Negoziazione parametri, scambio chiavi (Diffie-Hellman)</text>

                            {/* SA */}
                            <rect x="40" y="230" width="170" height="55" rx="10" fill={`${colors.cyan}12`} stroke={colors.cyan} strokeWidth="2" />
                            <text x="125" y="253" textAnchor="middle" fill={colors.cyan} fontSize="12" fontWeight="700" fontFamily="Inter">SA — Security Assoc.</text>
                            <text x="125" y="273" textAnchor="middle" fill={colors.textDim} fontSize="10" fontFamily="Inter">Parametri di sessione</text>

                            {/* SPD */}
                            <rect x="240" y="230" width="170" height="55" rx="10" fill={`${colors.accentAlt}12`} stroke={colors.accentAlt} strokeWidth="2" />
                            <text x="325" y="253" textAnchor="middle" fill={colors.accentAlt} fontSize="12" fontWeight="700" fontFamily="Inter">SPD — Security Policy</text>
                            <text x="325" y="273" textAnchor="middle" fill={colors.textDim} fontSize="10" fontFamily="Inter">Regole di sicurezza</text>

                            {/* Crypto algorithms */}
                            <rect x="40" y="300" width="370" height="40" rx="10" fill={`${colors.bgLight}`} stroke={colors.border} strokeWidth="1" />
                            <text x="225" y="325" textAnchor="middle" fill={colors.textMuted} fontSize="11" fontFamily="Inter">Algoritmi: AES-256 | SHA-256 | DH Group 14/19 | RSA/PSK</text>
                        </svg>
                    </div>
                </div>
            </div>
        );

        const SlideAHvsESP = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    <span style={{ color: colors.warn }}>AH</span> vs <span style={{ color: MODULE_COLOR }}>ESP</span>
                </h2>
                <Table
                    headers={['Caratteristica', 'AH (Authentication Header)', 'ESP (Encapsulating Security Payload)']}
                    rows={[
                        ['Protocollo IP', '51', '50'],
                        ['Crittografia', <span style={{ color: colors.danger }}>❌ No</span>, <span style={{ color: colors.success }}>✅ Sì (AES, 3DES)</span>],
                        ['Autenticazione', <span style={{ color: colors.success }}>✅ Sì</span>, <span style={{ color: colors.success }}>✅ Sì</span>],
                        ['Integrità', <span style={{ color: colors.success }}>✅ Intero pacchetto (incluso IP header)</span>, <span style={{ color: colors.warn }}>⚠️ Solo payload (non IP header esterno)</span>],
                        ['NAT compatibile', <span style={{ color: colors.danger }}>❌ No (modifica header → hash invalido)</span>, <span style={{ color: colors.success }}>✅ Sì (con NAT-T su UDP 4500)</span>],
                        ['Uso reale', 'Raro, solo se serve integrità header', <strong style={{ color: MODULE_COLOR }}>Standard de facto</strong>]
                    ]}
                />
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '16px', marginTop: '16px' }} className="slide-grid">
                    <Box type="warn" title="AH — Struttura pacchetto">
                        <Code>{`[IP Hdr][AH Hdr][Payload originale]
         ↑
  Next Header, SPI, Seq#, HMAC

  HMAC calcolato su TUTTO il pacchetto
  (incluso IP header → incompatibile NAT)`}</Code>
                    </Box>
                    <Box type="info" title="ESP — Struttura pacchetto">
                        <Code>{`[IP Hdr][ESP Hdr][Payload crittografato][ESP Trailer][Auth]
         ↑                                    ↑
  SPI, Seq#                           Padding, Next Hdr

  Crittografia: dal payload al trailer
  Auth HMAC: dall'ESP header al trailer`}</Code>
                    </Box>
                </div>
            </div>
        );

        const SlideModalita = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Modalità <span style={{ color: MODULE_COLOR }}>Transport</span> vs <span style={{ color: colors.purple }}>Tunnel</span>
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '24px' }} className="slide-grid">
                    <Glow color={MODULE_COLOR}>
                        <h3 style={{ color: MODULE_COLOR, fontSize: 'clamp(16px, 1.5vw, 22px)', marginBottom: '14px' }}>🔄 Transport Mode</h3>
                        <p style={{ color: colors.textDim, fontSize: 'clamp(13px, 1.2vw, 17px)', lineHeight: 1.7, marginBottom: '12px' }}>
                            L'<strong style={{ color: colors.text }}>header IP originale</strong> viene mantenuto. Solo il payload viene crittografato/autenticato.
                        </p>
                        <svg viewBox="0 0 400 80" style={{ width: '100%' }}>
                            <rect x="5" y="20" width="90" height="40" rx="6" fill={`${colors.accentAlt}20`} stroke={colors.accentAlt} strokeWidth="1.5" />
                            <text x="50" y="45" textAnchor="middle" fill={colors.accentAlt} fontSize="10" fontFamily="Inter" fontWeight="600">IP Hdr orig.</text>
                            <rect x="95" y="20" width="70" height="40" rx="6" fill={`${MODULE_COLOR}20`} stroke={MODULE_COLOR} strokeWidth="1.5" />
                            <text x="130" y="45" textAnchor="middle" fill={MODULE_COLOR} fontSize="10" fontFamily="Inter" fontWeight="600">ESP Hdr</text>
                            <rect x="165" y="20" width="160" height="40" rx="6" fill={`${colors.danger}15`} stroke={colors.danger} strokeWidth="1.5" />
                            <text x="245" y="45" textAnchor="middle" fill={colors.danger} fontSize="10" fontFamily="Inter" fontWeight="600">🔒 Payload cifrato</text>
                            <rect x="325" y="20" width="70" height="40" rx="6" fill={`${colors.purple}15`} stroke={colors.purple} strokeWidth="1.5" />
                            <text x="360" y="45" textAnchor="middle" fill={colors.purple} fontSize="10" fontFamily="Inter" fontWeight="600">ESP Trl</text>

                            <line x1="95" y1="70" x2="395" y2="70" stroke={MODULE_COLOR} strokeWidth="2" />
                            <text x="245" y="78" textAnchor="middle" fill={MODULE_COLOR} fontSize="9" fontFamily="Inter">← area protetta da ESP →</text>
                        </svg>
                        <Box type="tip" title="Uso">
                            Comunicazione <strong>host-to-host</strong> (es. due server nella stessa rete). Gli IP originali sono visibili.
                        </Box>
                    </Glow>

                    <Glow color={colors.purple}>
                        <h3 style={{ color: colors.purple, fontSize: 'clamp(16px, 1.5vw, 22px)', marginBottom: '14px' }}>🚇 Tunnel Mode</h3>
                        <p style={{ color: colors.textDim, fontSize: 'clamp(13px, 1.2vw, 17px)', lineHeight: 1.7, marginBottom: '12px' }}>
                            Un <strong style={{ color: colors.text }}>nuovo header IP</strong> viene aggiunto. L'intero pacchetto originale (IP + payload) viene crittografato.
                        </p>
                        <svg viewBox="0 0 400 80" style={{ width: '100%' }}>
                            <rect x="5" y="20" width="70" height="40" rx="6" fill={`${colors.success}20`} stroke={colors.success} strokeWidth="1.5" />
                            <text x="40" y="45" textAnchor="middle" fill={colors.success} fontSize="10" fontFamily="Inter" fontWeight="600">New IP</text>
                            <rect x="75" y="20" width="60" height="40" rx="6" fill={`${MODULE_COLOR}20`} stroke={MODULE_COLOR} strokeWidth="1.5" />
                            <text x="105" y="45" textAnchor="middle" fill={MODULE_COLOR} fontSize="10" fontFamily="Inter" fontWeight="600">ESP</text>
                            <rect x="135" y="20" width="200" height="40" rx="6" fill={`${colors.danger}15`} stroke={colors.danger} strokeWidth="1.5" />
                            <text x="235" y="38" textAnchor="middle" fill={colors.danger} fontSize="10" fontFamily="Inter" fontWeight="600">🔒 IP orig + Payload</text>
                            <text x="235" y="52" textAnchor="middle" fill={colors.textMuted} fontSize="8" fontFamily="Inter">(tutto cifrato)</text>
                            <rect x="335" y="20" width="60" height="40" rx="6" fill={`${colors.purple}15`} stroke={colors.purple} strokeWidth="1.5" />
                            <text x="365" y="45" textAnchor="middle" fill={colors.purple} fontSize="10" fontFamily="Inter" fontWeight="600">Trl</text>

                            <line x1="75" y1="70" x2="395" y2="70" stroke={colors.purple} strokeWidth="2" />
                            <text x="235" y="78" textAnchor="middle" fill={colors.purple} fontSize="9" fontFamily="Inter">← area protetta da ESP →</text>
                        </svg>
                        <Box type="tip" title="Uso">
                            <strong>Site-to-Site VPN</strong> tra gateway. Gli IP originali sono nascosti, solo gli IP dei gateway sono visibili.
                        </Box>
                    </Glow>
                </div>
            </div>
        );

        const SlideIKE = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    <span style={{ color: colors.purple }}>IKE</span> — Internet Key Exchange
                </h2>
                <Box type="info" title="A cosa serve IKE?">
                    IKE negozia automaticamente i parametri di sicurezza e scambia le chiavi crittografiche tra i due peer, creando le <strong>Security Association (SA)</strong>.
                </Box>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '24px', marginTop: '16px' }} className="slide-grid">
                    <Glow color={colors.purple}>
                        <h3 style={{ color: colors.purple, fontSize: 'clamp(16px, 1.5vw, 22px)', marginBottom: '14px' }}>Phase 1 — IKE SA (ISAKMP)</h3>
                        <p style={{ color: colors.textDim, fontSize: 'clamp(13px, 1.2vw, 17px)', lineHeight: 1.7, marginBottom: '12px' }}>
                            Crea un canale sicuro tra i peer per proteggere la negoziazione della Phase 2.
                        </p>
                        <ol style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)', lineHeight: 2, paddingLeft: '20px' }}>
                            <li><strong style={{ color: colors.text }}>Negoziazione parametri</strong>: algoritmo crittografia, hash, DH group, autenticazione, lifetime</li>
                            <li><strong style={{ color: colors.text }}>Diffie-Hellman</strong>: scambio chiavi pubbliche → generano shared secret</li>
                            <li><strong style={{ color: colors.text }}>Autenticazione</strong>: PSK (Pre-Shared Key) o certificati RSA/ECDSA</li>
                        </ol>
                        <Box type="tip" title="Modalità">
                            <strong>Main Mode</strong> (6 messaggi, più sicuro) o <strong>Aggressive Mode</strong> (3 messaggi, più veloce ma meno sicuro)
                        </Box>
                    </Glow>
                    <Glow color={MODULE_COLOR}>
                        <h3 style={{ color: MODULE_COLOR, fontSize: 'clamp(16px, 1.5vw, 22px)', marginBottom: '14px' }}>Phase 2 — IPsec SA (Quick Mode)</h3>
                        <p style={{ color: colors.textDim, fontSize: 'clamp(13px, 1.2vw, 17px)', lineHeight: 1.7, marginBottom: '12px' }}>
                            Negozia i parametri per il traffico dati reale, protetta dal tunnel IKE Phase 1.
                        </p>
                        <ol style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)', lineHeight: 2, paddingLeft: '20px' }}>
                            <li><strong style={{ color: colors.text }}>Transform set</strong>: ESP/AH, algoritmo, modalità</li>
                            <li><strong style={{ color: colors.text }}>Traffico interessante</strong>: ACL che definisce cosa proteggere</li>
                            <li><strong style={{ color: colors.text }}>PFS opzionale</strong>: nuovo Diffie-Hellman per Perfect Forward Secrecy</li>
                        </ol>
                        <Box type="success" title="Risultato">
                            Due SA unidirezionali (una per direzione), ognuna con un <strong>SPI</strong> (Security Parameter Index) univoco.
                        </Box>
                    </Glow>
                </div>
            </div>
        );

        const SlideSA = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    <span style={{ color: colors.cyan }}>Security Association</span> e SPI
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '24px' }} className="slide-grid">
                    <div>
                        <Box type="info" title="Cos'è una SA?">
                            Una <strong>Security Association</strong> è un contratto unidirezionale tra due peer che definisce
                            come proteggere il traffico: algoritmi, chiavi, lifetime, modalità.
                        </Box>
                        <Table
                            headers={['Parametro', 'Valore esempio']}
                            rows={[
                                [<strong style={{ color: colors.cyan }}>SPI</strong>, '0xA3F29B01'],
                                ['Algoritmo cifratura', 'AES-256-CBC'],
                                ['Algoritmo hash', 'SHA-256-HMAC'],
                                ['Chiave cifratura', '256 bit (derivata da DH)'],
                                ['Chiave HMAC', '256 bit'],
                                ['Lifetime', '3600 sec / 4.6 GB'],
                                ['Modalità', 'Tunnel'],
                                ['Protocollo', 'ESP']
                            ]}
                        />
                    </div>
                    <div>
                        <svg viewBox="0 0 450 300" style={{ width: '100%', maxWidth: '450px' }}>
                            {/* Router A */}
                            <rect x="20" y="100" width="100" height="80" rx="12" fill={colors.bgCard} stroke={MODULE_COLOR} strokeWidth="2" />
                            <text x="70" y="135" textAnchor="middle" fill={colors.text} fontSize="24">🔲</text>
                            <text x="70" y="165" textAnchor="middle" fill={colors.textDim} fontSize="11" fontFamily="Inter">Router A</text>

                            {/* Router B */}

                            {protocol === 'ah' && (
                                <>
                                    <line x1="20" y1="85" x2="480" y2="85" stroke={colors.warn} strokeWidth="2" />
                                    <text x="250" y="100" textAnchor="middle" fill={colors.warn} fontSize="11" fontWeight="600" fontFamily="Inter">← Autenticazione HMAC (intero pacchetto) →</text>
                                    <text x="250" y="118" textAnchor="middle" fill={colors.danger} fontSize="10" fontFamily="Inter">⚠️ Nessuna crittografia — payload leggibile!</text>
                                </>
                            )}
                            {protocol === 'esp' && (
                                <>
                                    {(() => {
                                        const segs = d.segments;
                                        const totalW = segs.reduce((a, s) => a + s.w, 0);
                                        const scale = 460 / totalW;
                                        const encStart = 20 + segs.slice(0, 2).reduce((a, s) => a + s.w * scale + 2, 0);
                                        return (
                                            <>
                                                <line x1={encStart} y1="85" x2="480" y2="85" stroke={colors.danger} strokeWidth="2" />
                                                <text x={(encStart + 480) / 2} y="100" textAnchor="middle" fill={colors.danger} fontSize="11" fontWeight="600" fontFamily="Inter">← Area crittografata →</text>
                                                <line x1={encStart - segs[1].w * scale - 2} y1="115" x2="480" y2="115" stroke={MODULE_COLOR} strokeWidth="1.5" strokeDasharray="4,3" />
                                                <text x="250" y="130" textAnchor="middle" fill={MODULE_COLOR} fontSize="10" fontFamily="Inter">← Autenticazione HMAC →</text>
                                            </>
                                        );
                                    })()}
                                </>
                            )}
                        </svg>

                        {/* Summary */}
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '12px' }} className="slide-grid">
                            <div style={{ padding: '12px', borderRadius: '8px', background: colors.bgLight }}>
                                <div style={{ color: d.color, fontWeight: 700, fontSize: 'clamp(11px, 1vw, 14px)', marginBottom: '4px' }}>Crittografia</div>
                                <div style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>{protocol === 'esp' ? '✅ Payload cifrato' : '❌ Nessuna'}</div>
                            </div>
                            <div style={{ padding: '12px', borderRadius: '8px', background: colors.bgLight }}>
                                <div style={{ color: d.color, fontWeight: 700, fontSize: 'clamp(11px, 1vw, 14px)', marginBottom: '4px' }}>Autenticazione</div>
                                <div style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>{protocol === 'ah' ? '✅ Tutto (incluso IP)' : '✅ ESP header + payload'}</div>
                            </div>
                            <div style={{ padding: '12px', borderRadius: '8px', background: colors.bgLight }}>
                                <div style={{ color: d.color, fontWeight: 700, fontSize: 'clamp(11px, 1vw, 14px)', marginBottom: '4px' }}>NAT Traversal</div>
                                <div style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>{protocol === 'esp' ? '✅ NAT-T (UDP 4500)' : '❌ Incompatibile'}</div>
                            </div>
                            <div style={{ padding: '12px', borderRadius: '8px', background: colors.bgLight }}>
                                <div style={{ color: d.color, fontWeight: 700, fontSize: 'clamp(11px, 1vw, 14px)', marginBottom: '4px' }}>IP originale</div>
                                <div style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>{mode === 'tunnel' ? '🔒 Nascosto nel tunnel' : '👁️ Visibile'}</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SlideBestPractices = () => (
            <div>
                <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 'clamp(24px, 2.5vw, 44px)', fontWeight: 700, color: colors.text, marginBottom: '24px' }}>
                    Best Practices e <span style={{ color: MODULE_COLOR }}>Riepilogo</span>
                </h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '20px', marginBottom: '24px' }} className="slide-grid">
                    <Box type="success" title="Configurazione IPsec consigliata">
                        <ul style={{ listStyle: 'none', padding: 0 }}>
                            {[
                                'ESP in modalità Tunnel (site-to-site)',
                                'AES-256 per crittografia',
                                'SHA-256 o SHA-384 per HMAC',
                                'DH Group 14+ (o ECDH Group 19+)',
                                'PFS abilitato (nuova DH in Phase 2)',
                                'IKEv2 invece di IKEv1',
                                'Certificati RSA/ECDSA > PSK'
                            ].map((item, i) => <li key={i} style={{ marginBottom: '8px' }}><span style={{ color: colors.success }}>✓</span> {item}</li>)}
                        </ul>
                    </Box>
                    <Box type="danger" title="Da evitare">
                        <ul style={{ listStyle: 'none', padding: 0 }}>
                            {[
                                'DES / 3DES (crittografia debole)',
                                'MD5 / SHA-1 per HMAC',
                                'DH Group 1-2 (768/1024 bit)',
                                'Aggressive Mode senza protezione',
                                'PSK deboli o condivise via email',
                                'Lifetime troppo lunghi (>24h)'
                            ].map((item, i) => <li key={i} style={{ marginBottom: '8px' }}><span style={{ color: colors.danger }}>✗</span> {item}</li>)}
                        </ul>
                    </Box>
                </div>
                <Glow>
                    <h3 style={{ color: MODULE_COLOR, fontSize: 'clamp(16px, 1.5vw, 22px)', marginBottom: '14px' }}>📋 Riepilogo Modulo 2</h3>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '14px' }} className="slide-grid">
                        {[
                            { label: 'IPsec', value: 'Suite L3: AH, ESP, IKE' },
                            { label: 'AH vs ESP', value: 'AH: solo auth. ESP: crittografia + auth' },
                            { label: 'Modalità', value: 'Transport (host) vs Tunnel (gateway)' },
                            { label: 'IKE', value: 'Phase 1 (canale sicuro) + Phase 2 (SA dati)' },
                            { label: 'DH', value: 'Scambio chiavi sicuro, minimo Group 14' },
                            { label: 'Prossimo', value: 'Modulo 3: SSL/TLS e OpenVPN →' }
                        ].map((item, i) => (
                            <div key={i} style={{ padding: '10px', borderRadius: '8px', background: colors.bgLight }}>
                                <div style={{ color: MODULE_COLOR, fontWeight: 700, fontSize: 'clamp(11px, 1vw, 14px)', marginBottom: '4px' }}>{item.label}</div>
                                <div style={{ color: colors.textDim, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>{item.value}</div>
                            </div>
                        ))}
                    </div>
                </Glow>
            </div>
        );

        // ─── SLIDE ARRAY ───
        const slides = [
            SlideTitolo,
            SlideArchitettura,
            SlideAHvsESP,
            SlideModalita,
            SlideIKE,
            SlideSA,
            SlideDiffieHellman,
            SlideConfigCisco,
            SlideSimIKE,
            SlideSimAHESP,
            SlideBestPractices
        ];

        // ─── APP ───
        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const total = slides.length;

            const goNext = useCallback(() => setCurrentSlide(s => Math.min(s + 1, total - 1)), [total]);
            const goPrev = useCallback(() => setCurrentSlide(s => Math.max(s - 1, 0)), []);
            const goIndex = useCallback(() => { window.location.href = 'index.html'; }, []);

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
                    if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
                    if (e.key === 'Escape') goIndex();
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [goNext, goPrev, goIndex]);

            const SlideComponent = slides[currentSlide];

            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                    {/* Top bar */}
                    <div style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100, background: `${colors.bg}ee`, backdropFilter: 'blur(12px)', borderBottom: `1px solid ${colors.border}`, padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <a href="index.html" style={{ color: colors.textDim, textDecoration: 'none', fontSize: 'clamp(12px, 1.1vw, 15px)' }}>← Indice</a>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <span style={{ color: MODULE_COLOR, fontWeight: 700, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>M{MODULE_NUM}</span>
                            <span style={{ color: colors.text, fontSize: 'clamp(12px, 1.1vw, 15px)' }}>{MODULE_TITLE}</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <span style={{ color: colors.textMuted, fontSize: 'clamp(11px, 1vw, 14px)' }}>{currentSlide + 1} / {total}</span>
                            <div style={{ width: '80px', height: '4px', background: colors.bgLight, borderRadius: '2px', overflow: 'hidden' }}>
                                <div style={{ width: `${((currentSlide + 1) / total) * 100}%`, height: '100%', background: MODULE_COLOR, borderRadius: '2px', transition: 'width 0.3s' }} />
                            </div>
                        </div>
                    </div>

                    {/* Content */}
                    <div style={{ flex: 1, maxWidth: '2200px', width: '94%', margin: '0 auto', padding: '70px 0 80px' }}>
                        <SlideComponent />
                    </div>

                    {/* Bottom bar */}
                    <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 100, background: `${colors.bg}ee`, backdropFilter: 'blur(12px)', borderTop: `1px solid ${colors.border}`, padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <button onClick={goPrev} disabled={currentSlide === 0} style={{ padding: '8px 20px', borderRadius: '8px', border: `1px solid ${colors.border}`, background: currentSlide === 0 ? 'transparent' : colors.bgLight, color: currentSlide === 0 ? colors.textMuted : colors.text, cursor: currentSlide === 0 ? 'default' : 'pointer', fontSize: 'clamp(12px, 1.1vw, 15px)', fontFamily: 'Inter' }}>← Indietro</button>
                        <div style={{ display: 'flex', gap: '16px', fontSize: 'clamp(11px, 1vw, 14px)' }}>
                            {currentSlide === 0 && PREV_MODULE && <a href={PREV_MODULE.file} style={{ color: colors.textMuted, textDecoration: 'none' }}>← {PREV_MODULE.title}</a>}
                            {currentSlide === total - 1 && NEXT_MODULE && <a href={NEXT_MODULE.file} style={{ color: MODULE_COLOR, textDecoration: 'none', fontWeight: 600 }}>{NEXT_MODULE.title} →</a>}
                        </div>
                        <button onClick={goNext} disabled={currentSlide === total - 1} style={{ padding: '8px 20px', borderRadius: '8px', border: `1px solid ${MODULE_COLOR}`, background: currentSlide === total - 1 ? 'transparent' : `${MODULE_COLOR}20`, color: currentSlide === total - 1 ? colors.textMuted : MODULE_COLOR, cursor: currentSlide === total - 1 ? 'default' : 'pointer', fontSize: 'clamp(12px, 1.1vw, 15px)', fontFamily: 'Inter', fontWeight: 600 }}>Avanti →</button>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
